<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Singapore Office Mascot Poster</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f7fbff;
      font-family: Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .tv-frame {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: calc(100vh * 16 / 9);
      max-height: calc(100vw * 9 / 16);
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #fff;
    }

    .poster-bg,
    .poster-bg::after {
      position: absolute;
      inset: 0;
    }

    .poster-bg {
      background-image: url("./assets/original-poster.png");
      background-size: cover;
      background-position: center;
      filter: blur(28px) saturate(1.12);
      transform: scale(1.08);
      opacity: 0.42;
    }

    .poster-bg::after {
      content: "";
      background:
        radial-gradient(circle at 22% 20%, rgba(255, 255, 255, 0.78), transparent 34%),
        radial-gradient(circle at 78% 82%, rgba(255, 255, 255, 0.70), transparent 36%),
        rgba(255, 255, 255, 0.35);
    }

    .poster-wrap {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 0;
    }

    .poster {
      display: block;
      width: auto;
      height: 100vh;
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
      background: #fff;
      box-shadow:
        0 0 0 1px rgba(17, 24, 39, 0.06),
        0 24px 64px rgba(15, 23, 42, 0.24);
    }

    @media (max-aspect-ratio: 16 / 9) {
      .tv-frame {
        width: 100vw;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <main class="tv-frame" aria-label="16:9 TV version of the Singapore office mascot poster">
    <div class="poster-bg" aria-hidden="true"></div>
    <div class="poster-wrap">
      <img class="poster" src="./assets/original-poster.png" alt="Create our Singapore office mascot using ChatGPT poster" />
    </div>
  </main>
</body>
</html>
